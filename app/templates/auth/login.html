<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TeconSolutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">

<div class="w-full max-w-md">
    
    <!-- Logo Section -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-white bg-opacity-20 rounded-2xl mb-4">
            <i class="fas fa-briefcase text-white text-2xl"></i>
        </div>
        <h1 class="text-3xl font-bold text-white">TeconSolutions</h1>
        <p class="text-blue-200 mt-1">Employee Management System</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-1">Welcome back!</h2>
        <p class="text-gray-500 text-sm mb-6">Sign in to your account</p>

        <!-- Error Message -->
        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-5 text-sm flex items-center gap-2">
            <i class="fas fa-exclamation-circle flex-shrink-0"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Login Form -->
        <form method="POST" action="/login" id="loginForm">
            
            <!-- Email -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fas fa-envelope text-sm"></i>
                    </span>
                    <input 
                        type="email" 
                        name="email" 
                        required 
                        placeholder="you@TeconSolutions.com"
                        class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        autofocus
                    >
                </div>
            </div>

            <!-- Password -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                        <i class="fas fa-lock text-sm"></i>
                    </span>
                    <input 
                        type="password" 
                        name="password"
                        id="passwordInput"
                        required 
                        placeholder="Enter your password"
                        class="w-full pl-9 pr-10 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                    >
                    <button type="button" 
                            onclick="togglePwd()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i id="pwdEye" class="fas fa-eye text-sm"></i>
                    </button>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="loginBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i>
                <span id="btnText">Sign In</span>
            </button>
        </form>

        <!-- Default credentials hint -->
        <div class="mt-6 p-3 bg-gray-50 rounded-lg border border-gray-200">
            <p class="text-xs text-gray-500 text-center">
                <i class="fas fa-info-circle mr-1"></i>
                Default admin: <strong>admin@TeconSolutions.com</strong> / <strong>Admin@123</strong>
            </p>
        </div>
    </div>

    <p class="text-center text-blue-200 text-xs mt-6">
        © 2025 TeconSolutions. All rights reserved.
    </p>
</div>

<script>
    function togglePwd() {
        const input = document.getElementById('passwordInput');
        const eye = document.getElementById('pwdEye');
        if (input.type === 'password') {
            input.type = 'text';
            eye.className = 'fas fa-eye-slash text-sm';
        } else {
            input.type = 'password';
            eye.className = 'fas fa-eye text-sm';
        }
    }

    // Show loading state when submitting
    document.getElementById('loginForm').addEventListener('submit', function() {
        const btn = document.getElementById('loginBtn');
        btn.innerHTML = '<svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24" fill="none"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Signing in...';
        btn.disabled = true;
    });
</script>

</body>
</html>
